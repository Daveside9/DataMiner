<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet9ja Extractor Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9; }
        .success { border-color: #28a745; background: #d4edda; }
        .error { border-color: #dc3545; background: #f8d7da; }
        .loading { border-color: #ffc107; background: #fff3cd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇳🇬 Bet9ja History Extractor Test</h1>
        
        <div class="form-group">
            <label for="bet9jaUrl">Bet9ja URL:</label>
            <input type="text" id="bet9jaUrl" 
                   value="https://sports.bet9ja.com/mobile/eventdetail/zoomsoccer/premier-zoom/premier-zoom/z.crystalpalace-z.manunited/717892344/VS_1X2"
                   placeholder="Enter Bet9ja URL...">
        </div>
        
        <button onclick="extractHistory()" id="extractBtn">Extract History</button>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        async function extractHistory() {
            const url = document.getElementById('bet9jaUrl').value;
            const resultDiv = document.getElementById('result');
            const extractBtn = document.getElementById('extractBtn');
            
            if (!url) {
                showResult('Please enter a Bet9ja URL', 'error');
                return;
            }
            
            // Show loading
            extractBtn.disabled = true;
            extractBtn.textContent = 'Extracting...';
            showResult('Extracting Bet9ja match history...', 'loading');
            
            try {
                const response = await fetch('http://localhost:5003/api/extract-bet9ja-history', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const teams = result.teams_found || {};
                    const data = result.data || {};
                    
                    let html = `
                        <h3>✅ Extraction Successful!</h3>
                        <p><strong>Teams:</strong> ${teams.home_team || 'Unknown'} vs ${teams.away_team || 'Unknown'}</p>
                        <p><strong>League:</strong> ${teams.league || 'Unknown'}</p>
                        <p><strong>Event ID:</strong> ${teams.event_id || 'Unknown'}</p>
                        <p><strong>Odds Found:</strong> ${result.odds_count || 0}</p>
                        <p><strong>Historical Matches:</strong> ${result.historical_count || 0}</p>
                    `;
                    
                    if (data.current_odds && Object.keys(data.current_odds).length > 0) {
                        html += '<h4>Current Odds:</h4><ul>';
                        for (const [market, odds] of Object.entries(data.current_odds)) {
                            html += `<li>${market}: ${odds}</li>`;
                        }
                        html += '</ul>';
                    }
                    
                    if (data.live_score) {
                        html += `<p><strong>Live Score:</strong> ${data.live_score.home}-${data.live_score.away}</p>`;
                    }
                    
                    showResult(html, 'success');
                } else {
                    showResult(`❌ Error: ${result.error || 'Unknown error'}`, 'error');
                }
                
            } catch (error) {
                console.error('Extraction error:', error);
                showResult(`❌ Network Error: ${error.message}`, 'error');
            } finally {
                extractBtn.disabled = false;
                extractBtn.textContent = 'Extract History';
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }
        
        // Test on page load
        window.addEventListener('load', function() {
            console.log('Bet9ja Extractor Test Page Loaded');
        });
    </script>
</body>
</html>
