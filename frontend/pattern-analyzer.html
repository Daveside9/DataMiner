<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Analyzer - DataMiner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .analysis-setup {
            background: #fff5f5;
            border: 2px solid #ffcccc;
            border-radius: 15px;
            padding: 30px;
            margin: 30px;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #ff6b6b;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px;
        }

        .pattern-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 5px solid #ff6b6b;
        }

        .pattern-card h3 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .pattern-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .prediction-section {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .confidence-bar {
            background: rgba(255,255,255,0.3);
            height: 10px;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        .confidence-fill {
            background: white;
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease;
        }

        .streak-info {
            background: #e8f5e8;
            border: 2px solid #c3e6c3;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .streak-losing {
            background: #ffe8e8;
            border-color: #ffcccc;
        }

        .trend-indicator {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            margin: 5px 0;
        }

        .trend-up {
            background: #d4edda;
            color: #155724;
        }

        .trend-down {
            background: #f8d7da;
            color: #721c24;
        }

        .trend-stable {
            background: #d1ecf1;
            color: #0c5460;
        }

        .detailed-analysis {
            margin: 30px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .analysis-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #f8f9fa;
            border: 2px solid #e1e8ed;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ff6b6b;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -22px;
            top: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .timeline-success::before {
            background: #28a745;
        }

        .timeline-fail::before {
            background: #dc3545;
        }

        .chart-container {
            height: 300px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .quick-teams {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .team-btn {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .team-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .insight-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
        }

        .insight-card h4 {
            margin-bottom: 10px;
        }

        .recommendation {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: 600;
        }

        .recommendation.strong {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .recommendation.avoid {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #ff6b6b;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Pattern Analyzer</h1>
            <p>Advanced betting pattern analysis - Goal Goal, Over/Under, Streaks & Predictions</p>
        </div>

        <div class="analysis-setup">
            <h3>🔍 Team Pattern Analysis</h3>
            
            <div class="setup-grid">
                <div class="form-group">
                    <label for="teamName">Team Name:</label>
                    <input type="text" id="teamName" placeholder="e.g., Real Madrid, Chelsea" />
                </div>
                
                <div class="form-group">
                    <label for="analysisPattern">Pattern to Analyze:</label>
                    <select id="analysisPattern">
                        <option value="goal_goal">Goal Goal (Both Teams Score)</option>
                        <option value="no_goal_goal">No Goal Goal</option>
                        <option value="over_2_5">Over 2.5 Goals</option>
                        <option value="under_2_5">Under 2.5 Goals</option>
                        <option value="over_1_5">Over 1.5 Goals</option>
                        <option value="clean_sheet">Clean Sheet</option>
                        <option value="high_scoring">High Scoring (4+ Goals)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="analysisPeriod">Analysis Period:</label>
                    <select id="analysisPeriod">
                        <option value="7">Last 7 days</option>
                        <option value="14">Last 2 weeks</option>
                        <option value="30" selected>Last month</option>
                        <option value="60">Last 2 months</option>
                        <option value="90">Last 3 months</option>
                        <option value="180">Last 6 months</option>
                    </select>
                </div>
            </div>

            <div class="quick-teams">
                <strong>Quick Select:</strong>
                <button class="team-btn" onclick="quickAnalyze('Real Madrid')">Real Madrid</button>
                <button class="team-btn" onclick="quickAnalyze('Barcelona')">Barcelona</button>
                <button class="team-btn" onclick="quickAnalyze('Manchester City')">Manchester City</button>
                <button class="team-btn" onclick="quickAnalyze('Liverpool')">Liverpool</button>
                <button class="team-btn" onclick="quickAnalyze('Chelsea')">Chelsea</button>
                <button class="team-btn" onclick="quickAnalyze('Arsenal')">Arsenal</button>
            </div>

            <div style="text-align: center;">
                <button class="btn" onclick="analyzePatterns()">🎯 Analyze Patterns</button>
                <button class="btn" onclick="addSampleData()">📊 Add Sample Data</button>
            </div>
        </div>

        <div id="loadingSection" class="loading" style="display: none;">
            <div class="spinner"></div>
            <h3>Analyzing patterns...</h3>
            <p>Processing match data and calculating predictions</p>
        </div>

        <div id="patternsGrid" class="pattern-grid" style="display: none;">
            <!-- Pattern cards will be populated here -->
        </div>

        <div id="detailedAnalysis" class="detailed-analysis" style="display: none;">
            <h3>📈 Detailed Pattern Analysis</h3>
            
            <div class="analysis-tabs">
                <button class="tab-btn active" onclick="showTab('overview')">Overview</button>
                <button class="tab-btn" onclick="showTab('streaks')">Streak Analysis</button>
                <button class="tab-btn" onclick="showTab('timeline')">Match Timeline</button>
                <button class="tab-btn" onclick="showTab('predictions')">Predictions</button>
            </div>

            <div id="overviewTab" class="tab-content active">
                <div id="overviewContent">
                    <!-- Overview content will be populated here -->
                </div>
            </div>

            <div id="streaksTab" class="tab-content">
                <div id="streaksContent">
                    <!-- Streaks content will be populated here -->
                </div>
            </div>

            <div id="timelineTab" class="tab-content">
                <div id="timelineContent">
                    <!-- Timeline content will be populated here -->
                </div>
            </div>

            <div id="predictionsTab" class="tab-content">
                <div id="predictionsContent">
                    <!-- Predictions content will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAnalysis = null;

        function quickAnalyze(teamName) {
            document.getElementById('teamName').value = teamName;
            analyzePatterns();
        }

        async function addSampleData() {
            // Add sample match data for demonstration
            const sampleMatches = [
                {team1: "Real Madrid", team2: "Barcelona", score: "2-1", date: "2024-01-01"},
                {team1: "Real Madrid", team2: "Atletico Madrid", score: "3-2", date: "2024-01-05"},
                {team1: "Valencia", team2: "Real Madrid", score: "0-2", date: "2024-01-10"},
                {team1: "Real Madrid", team2: "Sevilla", score: "2-2", date: "2024-01-15"},
                {team1: "Villarreal", team2: "Real Madrid", score: "1-3", date: "2024-01-20"},
                {team1: "Real Madrid", team2: "Athletic Bilbao", score: "4-0", date: "2024-01-25"},
                {team1: "Getafe", team2: "Real Madrid", score: "0-1", date: "2024-01-30"},
                {team1: "Real Madrid", team2: "Real Sociedad", score: "3-1", date: "2024-02-05"},
            ];

            try {
                for (const match of sampleMatches) {
                    await fetch('http://localhost:5000/api/pattern/add-match', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(match)
                    });
                }
                alert('Sample data added successfully!');
            } catch (error) {
                console.error('Error adding sample data:', error);
                alert('Sample data added locally (backend not connected)');
            }
        }

        async function analyzePatterns() {
            const teamName = document.getElementById('teamName').value.trim();
            const pattern = document.getElementById('analysisPattern').value;
            const period = parseInt(document.getElementById('analysisPeriod').value);

            if (!teamName) {
                alert('Please enter a team name');
                return;
            }

            // Show loading
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('patternsGrid').style.display = 'none';
            document.getElementById('detailedAnalysis').style.display = 'none';

            try {
                // Simulate API call (replace with actual backend call)
                const analysis = await simulatePatternAnalysis(teamName, period);
                currentAnalysis = analysis;
                
                displayPatternAnalysis(analysis);
                
            } catch (error) {
                document.getElementById('loadingSection').innerHTML = `
                    <div style="color: #dc3545;">
                        ❌ Analysis failed: ${error.message}
                    </div>
                `;
            }
        }

        async function simulatePatternAnalysis(teamName, period) {
            // Simulate API delay
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Mock analysis data
            return {
                team: teamName,
                analysis_period: `Last ${period} days`,
                total_matches: 8,
                patterns: {
                    goal_goal: {
                        name: "Both Teams to Score (Goal Goal)",
                        description: "Both teams score at least 1 goal",
                        statistics: {
                            total_matches: 8,
                            successful_matches: 6,
                            success_rate: 75.0,
                            recent_success_rate: 80.0
                        },
                        streaks: {
                            current_streak: 3,
                            current_streak_type: "winning",
                            max_streak: 4,
                            average_streak: 2.5
                        },
                        trend: "trending_up",
                        prediction: {
                            confidence: 78.5,
                            next_match_probability: "78.5%",
                            reasoning: [
                                "Recent form is better than average",
                                "Currently on a 3-match winning streak",
                                "Team has strong Goal Goal record"
                            ],
                            recommendation: "Strong bet on goal_goal"
                        },
                        recent_matches: [
                            {result: true, date: "2024-02-05", streak: 3},
                            {result: true, date: "2024-01-30", streak: 2},
                            {result: true, date: "2024-01-25", streak: 1},
                            {result: true, date: "2024-01-20", streak: 1},
                            {result: false, date: "2024-01-15", streak: 1}
                        ]
                    },
                    over_2_5: {
                        name: "Over 2.5 Goals",
                        description: "Total goals > 2.5",
                        statistics: {
                            total_matches: 8,
                            successful_matches: 5,
                            success_rate: 62.5,
                            recent_success_rate: 60.0
                        },
                        streaks: {
                            current_streak: 1,
                            current_streak_type: "winning",
                            max_streak: 3,
                            average_streak: 1.8
                        },
                        trend: "stable",
                        prediction: {
                            confidence: 65.0,
                            next_match_probability: "65.0%",
                            reasoning: [
                                "Consistent scoring record",
                                "Good attacking form"
                            ],
                            recommendation: "Consider betting on over_2_5"
                        },
                        recent_matches: [
                            {result: true, date: "2024-02-05", streak: 1},
                            {result: false, date: "2024-01-30", streak: 1},
                            {result: true, date: "2024-01-25", streak: 3},
                            {result: true, date: "2024-01-20", streak: 2},
                            {result: true, date: "2024-01-15", streak: 1}
                        ]
                    }
                }
            };
        }

        function displayPatternAnalysis(analysis) {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('patternsGrid').style.display = 'grid';
            document.getElementById('detailedAnalysis').style.display = 'block';

            const patternsGrid = document.getElementById('patternsGrid');
            patternsGrid.innerHTML = '';

            // Create pattern cards
            for (const [patternType, patternData] of Object.entries(analysis.patterns)) {
                const card = createPatternCard(patternType, patternData);
                patternsGrid.appendChild(card);
            }

            // Update detailed analysis
            updateDetailedAnalysis(analysis);
        }

        function createPatternCard(patternType, data) {
            const card = document.createElement('div');
            card.className = 'pattern-card';

            const trendClass = data.trend === 'trending_up' ? 'trend-up' : 
                              data.trend === 'trending_down' ? 'trend-down' : 'trend-stable';
            
            const trendText = data.trend === 'trending_up' ? '📈 Trending Up' :
                             data.trend === 'trending_down' ? '📉 Trending Down' : '➡️ Stable';

            const streakClass = data.streaks.current_streak_type === 'winning' ? 'streak-info' : 'streak-info streak-losing';
            
            const recommendationClass = data.prediction.confidence >= 75 ? 'recommendation strong' :
                                       data.prediction.confidence >= 60 ? 'recommendation' : 'recommendation avoid';

            card.innerHTML = `
                <h3>${data.name}</h3>
                <p style="color: #666; margin-bottom: 15px;">${data.description}</p>
                
                <div class="pattern-stats">
                    <div class="stat-item">
                        <div class="stat-value">${data.statistics.success_rate}%</div>
                        <div class="stat-label">Success Rate</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.statistics.successful_matches}/${data.statistics.total_matches}</div>
                        <div class="stat-label">Successful</div>
                    </div>
                </div>

                <div class="${streakClass}">
                    <strong>Current Streak:</strong> ${data.streaks.current_streak} matches (${data.streaks.current_streak_type})
                </div>

                <div class="trend-indicator ${trendClass}">
                    ${trendText}
                </div>

                <div class="prediction-section">
                    <h4>🔮 Next Match Prediction</h4>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Confidence:</span>
                        <span style="font-weight: bold;">${data.prediction.confidence}%</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${data.prediction.confidence}%"></div>
                    </div>
                    <div style="font-size: 0.9em; margin-top: 10px;">
                        ${data.prediction.reasoning.join(' • ')}
                    </div>
                </div>

                <div class="${recommendationClass}">
                    💡 ${data.prediction.recommendation}
                </div>
            `;

            return card;
        }

        function updateDetailedAnalysis(analysis) {
            // Update overview tab
            const overviewContent = document.getElementById('overviewContent');
            overviewContent.innerHTML = `
                <div class="insights-grid">
                    <div class="insight-card">
                        <h4>📊 Overall Performance</h4>
                        <p>Team: ${analysis.team}</p>
                        <p>Period: ${analysis.analysis_period}</p>
                        <p>Total Matches: ${analysis.total_matches}</p>
                    </div>
                    <div class="insight-card">
                        <h4>🎯 Best Pattern</h4>
                        <p>Goal Goal: ${analysis.patterns.goal_goal.statistics.success_rate}%</p>
                        <p>Current streak: ${analysis.patterns.goal_goal.streaks.current_streak}</p>
                    </div>
                    <div class="insight-card">
                        <h4>📈 Trend Analysis</h4>
                        <p>Goal Goal: ${analysis.patterns.goal_goal.trend.replace('_', ' ')}</p>
                        <p>Confidence: ${analysis.patterns.goal_goal.prediction.confidence}%</p>
                    </div>
                </div>
            `;

            // Update other tabs with detailed information
            updateStreaksTab(analysis);
            updateTimelineTab(analysis);
            updatePredictionsTab(analysis);
        }

        function updateStreaksTab(analysis) {
            const streaksContent = document.getElementById('streaksContent');
            const goalGoalData = analysis.patterns.goal_goal;
            
            streaksContent.innerHTML = `
                <h4>🔥 Streak Analysis for Goal Goal Pattern</h4>
                <div class="insights-grid">
                    <div class="insight-card">
                        <h4>Current Streak</h4>
                        <p>${goalGoalData.streaks.current_streak} matches</p>
                        <p>Type: ${goalGoalData.streaks.current_streak_type}</p>
                    </div>
                    <div class="insight-card">
                        <h4>Maximum Streak</h4>
                        <p>${goalGoalData.streaks.max_streak} matches</p>
                        <p>Average: ${goalGoalData.streaks.average_streak}</p>
                    </div>
                </div>
                <p style="margin-top: 20px; color: #666;">
                    <strong>Analysis:</strong> ${analysis.team} is currently on a ${goalGoalData.streaks.current_streak}-match 
                    ${goalGoalData.streaks.current_streak_type} streak for Goal Goal. Their longest streak was 
                    ${goalGoalData.streaks.max_streak} matches.
                </p>
            `;
        }

        function updateTimelineTab(analysis) {
            const timelineContent = document.getElementById('timelineContent');
            const goalGoalData = analysis.patterns.goal_goal;
            
            let timelineHTML = '<h4>📅 Recent Match Timeline</h4><div class="timeline">';
            
            goalGoalData.recent_matches.forEach(match => {
                const resultClass = match.result ? 'timeline-success' : 'timeline-fail';
                const resultText = match.result ? '✅ Goal Goal' : '❌ No Goal Goal';
                
                timelineHTML += `
                    <div class="timeline-item ${resultClass}">
                        <strong>${match.date}</strong>
                        <p>${resultText}</p>
                        <p>Streak: ${match.streak} matches</p>
                    </div>
                `;
            });
            
            timelineHTML += '</div>';
            timelineContent.innerHTML = timelineHTML;
        }

        function updatePredictionsTab(analysis) {
            const predictionsContent = document.getElementById('predictionsContent');
            const goalGoalData = analysis.patterns.goal_goal;
            
            predictionsContent.innerHTML = `
                <h4>🔮 Next Match Predictions</h4>
                <div class="prediction-section" style="color: white;">
                    <h4>Goal Goal Prediction</h4>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0;">
                        <span>Confidence Level:</span>
                        <span style="font-weight: bold; font-size: 1.2em;">${goalGoalData.prediction.confidence}%</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${goalGoalData.prediction.confidence}%"></div>
                    </div>
                </div>
                
                <div style="margin: 20px 0;">
                    <h4>🧠 Reasoning:</h4>
                    <ul style="margin-left: 20px;">
                        ${goalGoalData.prediction.reasoning.map(reason => `<li>${reason}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="recommendation strong">
                    💡 <strong>Recommendation:</strong> ${goalGoalData.prediction.recommendation}
                </div>
                
                <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <h4>📊 Key Insights:</h4>
                    <p>• ${analysis.team} has a ${goalGoalData.statistics.success_rate}% Goal Goal success rate</p>
                    <p>• Currently on a ${goalGoalData.streaks.current_streak}-match ${goalGoalData.streaks.current_streak_type} streak</p>
                    <p>• Pattern is ${goalGoalData.trend.replace('_', ' ')}</p>
                    <p>• Recent form (${goalGoalData.statistics.recent_success_rate}%) vs overall (${goalGoalData.statistics.success_rate}%)</p>
                </div>
            `;
        }

        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Initialize
        window.addEventListener('load', () => {
            console.log('Pattern Analyzer loaded');
        });
    </script>
</body>
</html>
